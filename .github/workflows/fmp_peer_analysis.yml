name: Ad-Hoc Peer Analysis

on:
  workflow_dispatch:
    inputs:
      category:
        description: 'Industry Group (e.g., Refinery)'
        required: true
        default: 'Custom_Peers'
      tickers:
        description: 'Comma-separated, non-case-sensitive tickers (target_ticker, peer1, peer2,...)'
        required: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Peer Analysis Script
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          TARGET_CATEGORY: ${{ github.event.inputs.category }}
          TARGET_TICKERS: ${{ github.event.inputs.tickers }}
        run: python a2.peer_analysis.py

      - name: Commit and push changes
        id: commit_step
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add outputs/
          
          if ! git diff --staged --quiet; then
            git commit -m "Ad-hoc Peer Analysis: ${{ github.event.inputs.category }}"
            git push
            echo "changes_pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new analysis to commit."
            echo "changes_pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Email Notification
        if: steps.commit_step.outputs.changes_pushed == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Peer Analysis Complete: ${{ github.event.inputs.category }}"
          to: longhao.zhuo@gmail.com
          from: GitHub Actions Tracker
          body: |
            The Ad-Hoc Peer Analysis has finished running.
            
            Details:
            - Category: ${{ github.event.inputs.category }}
            - Tickers Evaluated: ${{ github.event.inputs.tickers }}
            
            You can review the generated outputs in your repository here:
            https://github.com/${{ github.repository }}/commits/main
